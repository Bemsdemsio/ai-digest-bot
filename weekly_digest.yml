name: Weekly AI Digest

on:
  schedule:
    # Щопонеділка о 09:00 UTC (12:00 Київ, літній час)
    - cron: "0 9 * * 1"
  workflow_dispatch:   # ручний запуск через UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Кеш seen_ids.json між запусками (щоб не дублювати пости)
      - name: Restore seen IDs
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ runner.os }}-${{ github.run_id }}
          restore-keys: seen-ids-${{ runner.os }}-

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          DAYS_BACK:           "7"
          MAX_TOOLS:           "15"
        run: python digest.py

      - name: Save seen IDs
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ runner.os }}-${{ github.run_id }}
